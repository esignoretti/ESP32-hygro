services:
  - type: web
    name: esp32-hygro
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esp32-hygro-db
          property: connectionString
      - key: MQTT_BROKER
        value: 580bc15dbdc94a9686c52d5a825dd4c3.s1.eu.hivemq.cloud
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: esp32-hygro-db
    region: frankfurt
    plan: free
